name: Sync Featured App Locking FAQ

on:
  workflow_dispatch: {}
  schedule:
    - cron: "43 5 * * *"

permissions:
  contents: write

jobs:
  sync-faq:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync locking FAQ page
        run: node scripts/sync-featured-app-locking-faq.mjs

      - name: Commit updated FAQ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add featured-app-locking-faq.html
          git commit -m "Sync featured app locking FAQ"
          git push
