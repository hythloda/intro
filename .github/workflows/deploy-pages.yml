name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - Sync Featured App Coupon Guidance
      - Sync Featured App Locking FAQ
      - Sync Featured App Board
      - Sync SV Milestone Framework
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p _site
          shopt -s dotglob
          for path in *; do
            case "$path" in
              .git|.github|scripts|node_modules|_site)
                continue
                ;;
            esac
            cp -R "$path" _site/
          done
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
