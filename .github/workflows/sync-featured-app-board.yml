name: Sync Featured App Board

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  actions: write

jobs:
  sync-featured-app-board:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync Featured App board
        env:
          MONDAY: ${{ secrets.MONDAY }}
        run: node scripts/sync-featured-app-board.mjs

      - name: Commit updated Featured App board
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add assets/featured-app-board-data.js
          git commit -m "Sync featured app board"

          git pull --rebase origin main
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --repo "${{ github.repository }}" --ref main
