name: Sync SV Milestone Framework

on:
  workflow_dispatch: {}
  schedule:
    - cron: "11 6 * * *"

permissions:
  contents: write
  actions: write

jobs:
  sync-framework:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync SV milestone framework page
        run: node scripts/sync-sv-milestone-framework.mjs

      - name: Commit updated framework
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add sv-milestone-framework.html
          git commit -m "Sync SV milestone framework"

          git pull --rebase origin main
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --repo "${{ github.repository }}" --ref main
