name: Sync Featured App Coupon Guidance

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * *"

permissions:
  contents: write

jobs:
  sync-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync coupon guidance page
        run: node scripts/sync-featured-app-coupon-guidance.mjs

      - name: Commit updated guidance
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add featured-app-coupon-guidance.html
          git commit -m "Sync featured app coupon guidance"
          git push
