<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site-chrome.css">
  <script src="assets/site-chrome.js" defer></script>
  <script src="assets/featured-app-partyid-changes-data.js" defer></script>
  <title>Featured App PartyID Changes | Canton Network</title>

  <style>
    :root {
      --panel: rgba(6, 4, 30, 0.92);
      --panel-soft: rgba(11, 8, 40, 0.82);
      --line: rgba(127, 91, 188, 0.28);
      --text: #f7fbfc;
      --muted: #d6d0e5;
      --accent: #d5a5e3;
      --accent-strong: #f3ff97;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 78% 18%, rgba(129, 84, 120, 0.42), transparent 26%),
        radial-gradient(circle at 18% 80%, rgba(63, 21, 172, 0.18), transparent 34%),
        linear-gradient(180deg, #05014a 0%, #14045a 54%, #090221 100%);
      color: var(--text);
      font-family: "IBM Plex Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      padding: 32px 18px 48px;
      box-sizing: border-box;
    }

    .wrap {
      width: min(90vw, 1500px);
      margin: 0 auto;
    }

    .panel {
      padding: 48px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(213, 165, 227, 0.14);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      max-width: 880px;
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 18px;
      max-width: 920px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    a {
      color: var(--accent-strong);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      border: 1px solid rgba(126, 92, 186, 0.34);
      color: var(--text);
    }

    .changes-list {
      display: grid;
      gap: 18px;
      margin-top: 34px;
    }

    .change-card {
      padding: 24px;
      border-radius: 22px;
      background: var(--panel-soft);
      border: 1px solid rgba(126, 92, 186, 0.22);
    }

    .change-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .change-title {
      margin: 0;
      color: var(--text);
      font-size: 24px;
      line-height: 1.2;
    }

    .change-meta {
      color: rgba(255, 255, 255, 0.62);
      font-size: 14px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .field-pill {
      display: inline-flex;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(213, 165, 227, 0.14);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .value-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .value-box {
      padding: 16px;
      border-radius: 16px;
      background: rgba(3, 2, 20, 0.46);
      border: 1px solid rgba(126, 92, 186, 0.18);
      min-width: 0;
    }

    .value-label {
      margin: 0 0 8px;
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .value-text {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty-state {
      margin-top: 34px;
      padding: 28px;
      border-radius: 18px;
      background: rgba(243, 255, 151, 0.08);
      border: 1px solid rgba(243, 255, 151, 0.18);
    }

    @media (max-width: 760px) {
      .panel {
        padding: 28px 22px;
      }

      h1 {
        font-size: 32px;
      }

      p {
        font-size: 16px;
      }

      .change-topline,
      .value-grid {
        display: grid;
      }

      .change-meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div data-site-header></div>
  <main class="wrap">
    <section class="panel">
      <div class="eyebrow">Featured Applications</div>
      <h1>Recent Featured App PartyID changes.</h1>
      <p>
        This page shows the 20 most recent changes to Featured App PartyID and locking PartyID fields.
        It updates daily.
      </p>

      <div class="actions">
        <a class="button-secondary" href="featured-app-board.html">View Featured App Table</a>
        <a class="button-secondary" href="featured-applications.html">Back to Featured Applications</a>
      </div>

      <div class="changes-list" data-changes-list></div>
      <div class="empty-state" data-empty-state hidden>
        <p>No PartyID changes were found in the current activity window.</p>
      </div>
    </section>
  </main>
  <div data-site-footer></div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const data = window.FEATURED_APP_PARTYID_CHANGES_DATA || {};
      const changes = Array.isArray(data.changes) ? data.changes : [];
      const list = document.querySelector("[data-changes-list]");
      const emptyState = document.querySelector("[data-empty-state]");

      const text = (value) => String(value || "").trim();
      const formatDate = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "Unknown date";
        }
        return date.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      };

      function appendValueBox(parent, label, value) {
        const box = document.createElement("div");
        box.className = "value-box";
        const labelNode = document.createElement("p");
        labelNode.className = "value-label";
        labelNode.textContent = label;
        const valueNode = document.createElement("p");
        valueNode.className = "value-text";
        valueNode.textContent = text(value) || "Empty / removed";
        box.appendChild(labelNode);
        box.appendChild(valueNode);
        parent.appendChild(box);
      }

      for (const change of changes) {
        const card = document.createElement("article");
        card.className = "change-card";

        const top = document.createElement("div");
        top.className = "change-topline";

        const titleWrap = document.createElement("div");
        const title = document.createElement("h2");
        title.className = "change-title";
        title.textContent = text(change.itemName) || "Unknown application";
        const field = document.createElement("div");
        field.className = "field-pill";
        field.textContent = text(change.field) || "PartyID field";
        titleWrap.appendChild(title);
        titleWrap.appendChild(field);

        const meta = document.createElement("div");
        meta.className = "change-meta";
        meta.textContent = formatDate(change.changedAt);

        top.appendChild(titleWrap);
        top.appendChild(meta);

        const values = document.createElement("div");
        values.className = "value-grid";
        appendValueBox(values, "Was", change.previousValue);
        appendValueBox(values, "Became", change.newValue);

        card.appendChild(top);
        card.appendChild(values);
        list.appendChild(card);
      }

      emptyState.hidden = changes.length > 0;
    });
  </script>
</body>
</html>
